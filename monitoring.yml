# ──────────────────────────────────────────────────────────────────────────────
# node-monitoring — example configuration
#
# Bootstrap (once at startup):
#
#   import { Monitoring, loadConfig } from "@cobui/node-monitoring";
#
#   const monitoring = new Monitoring();
#   monitoring.add(loadConfig("monitoring.config.yml"));
#   monitoring.start();
#
# Credentials and other secrets should never be committed to source control.
# Use ${VAR_NAME} placeholders! `loadConfig` resolves them from process.env at
# startup and throws immediately if a referenced variable is not set.
# ──────────────────────────────────────────────────────────────────────────────

# ── Primary application namespace - InfluxDB v2 (InfluxDB Cloud / OSS 2.x) ──
- namespace: app
  enabled: true

  # Tags merged into every aggregate emitted by this namespace.
  tags:
    env: production
    service: api-gateway

  transporter:
    type: influx
    version: 2
    key: influx # default: "influx". Namespaces sharing the same key share one queue and rate limit. Use a different key per transporter when you need independent queues (e.g. separate hosts or rate limits).
    host: localhost
    port: 8086
    protocol: http
    org: org
    bucket: bucket
    token: dONkZBwNNLKZLl62rmhPCJFpjU8j5OnydSpwibCyAjZR3Y9y0JJV9pr2w_YH7xU6o8zwu7Ag8F6loxyBUpV3IQ==

    # How many requests to send per second.
    rateLimit: 20

    # Controls the InfluxDB measurement name:
    #   "uri"       : each metric URI is its own measurement (default).
    #
    #   "namespace" : all metrics share one measurement; URI becomes the `namespace` tag.
    #                 The `namespace` tag can be added dynamically through a sensor invocation or defined via the configuration per metric
    measurementStrategy: uri

    retry:
      retries: 3 # attempts after the initial send
      minTimeout: 1000 # ms before the first retry
      maxTimeout: 30000 # upper bound on backoff delay
      factor: 2 # exponential multiplier (1s -> 2s -> 4s ... capped at 30s)

    queue:
      maxSize: 10000 # drop incoming items when the normal queue exceeds this
      lossInterval: 300000 # ms between loss-record flushes (default: 5 min)
      batchSize:
        500 # aggregates per HTTP write request (default: 500)
        # InfluxDB recommends 5_000 for raw event streams;

  metrics:
    - uri: requests.orders.get
      type: counter
      interval: 100 # collect every 100ms
      reset: false # clear the counter after each collection
      enabled: true

    - uri: requests.orders.post
      type: counter
      interval: 100 # collect every 100ms
      reset: false # clear the counter after each collection
      enabled: true

    - uri: requests.health
      type: counter
      interval: 100 # collect every 100ms
      reset: false # clear the counter after each collection
      enabled: true      

    - uri: latency.orders.get
      type: histogram
      interval: 100
      reset: true
      enabled: true

    - uri: latency.orders.post
      type: histogram
      interval: 100
      reset: true
      enabled: true

    - uri: errors.orders.post
      type: counter
      interval: 100
      reset: false
      enabled: true
    
    - uri: server.heap.used
      type: gauge
      interval: 100 # collect every 5 s
      reset: false # gauges represent a current value — never reset
      enabled: true

    - uri: server.connections.active
      type: gauge
      interval: 100 # collect every 5 s
      reset: false # gauges represent a current value — never reset
      enabled: true

    - uri: errors.unhandled
      type: counter
      interval: 100
      reset: false
      enabled: true
